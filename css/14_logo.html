<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parmar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        nav {
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border-radius: 60px;
            padding: 14px 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1200px;
            transition: box-shadow 0.3s ease;
        }

        nav:hover {
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #2c3e50;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: default;
            user-select: none;
        }

        .links {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .links a {
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            color: #4a5568;
            text-transform: capitalize;
            position: relative;
            transition: color 0.3s ease;
            padding: 4px 0;
        }

        .links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 0%;
            height: 2.5px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .links a:hover {
            color: #667eea;
        }

        .links a:hover::after {
            width: 100%;
        }

        .search input {
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 0.95rem;
            width: 200px;
            outline: none;
            background: #f8fafc;
            color: #1a202c;
            transition: all 0.3s ease;
        }

        .search input::placeholder {
            color: #a0aec0;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .search input:focus {
            border-color: #667eea;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            width: 260px;
        }

        @media (max-width: 768px) {
            nav {
                flex-wrap: wrap;
                gap: 16px 20px;
                padding: 16px 24px;
                border-radius: 32px;
            }

            .logo {
                font-size: 1.5rem;
                width: auto;
            }

            .links {
                order: 3;
                width: 100%;
                justify-content: center;
                gap: 24px;
            }

            .links a {
                font-size: 0.95rem;
            }

            .search {
                margin-left: auto;
            }

            .search input {
                width: 160px;
                padding: 8px 16px;
                font-size: 0.9rem;
            }

            .search input:focus {
                width: 200px;
            }
        }

        @media (max-width: 480px) {
            nav {
                padding: 14px 18px;
                border-radius: 24px;
                gap: 12px;
            }

            .logo {
                font-size: 1.3rem;
            }

            .links {
                gap: 16px;
                flex-wrap: wrap;
            }

            .links a {
                font-size: 0.85rem;
            }

            .search input {
                width: 130px;
                font-size: 0.8rem;
                padding: 6px 14px;
            }

            .search input:focus {
                width: 160px;
            }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(102, 126, 234, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(118, 75, 162, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

      <nav>

        <div class="logo">parmar</div>

        <div class="links">
            <a href="#">home</a>
            <a href="#">about</a>
            <a href="#">projects</a>
        </div>

        <div class="search">
            <input type="text" placeholder="Search..." />
        </div>

    </nav>

</body>
</html>
