<!DOCTYPE html>
<html>
<head>
    <title>Shaadi.com Registration</title>
</head>
<body>

<h1 align="center">Shaadi.com Registration Form</h1>
<hr>

<form>
    <table align="center" cellpadding="8">

        <tr>
            <td><b>Profile Created For</b></td>
            <td>
                <select>
                    <option>Self</option>
                    <option>Son</option>
                    <option>Daughter</option>
                    <option>Brother</option>
                    <option>Sister</option>
                    <option>Relative</option>
                </select>
            </td>
        </tr>

        <tr>
            <td><b>Full Name</b></td>
            <td>
                <input type="text" placeholder="Enter full name">
            </td>
        </tr>

        <tr>
            <td><b>Gender</b></td>
            <td>
                <input type="radio" name="gender"> Male
                <input type="radio" name="gender"> Female
            </td>
        </tr>

        <tr>
            <td><b>Date of Birth</b></td>
            <td>
                <input type="date">
            </td>
        </tr>

        <tr>
            <td><b>Religion</b></td>
            <td>
                <select>
                    <option>Hindu</option>
                    <option>Muslim</option>
                    <option>Christian</option>
                    <option>Sikh</option>
                    <option>Jain</option>
                    <option>Other</option>
                </select>
            </td>
        </tr>

        <tr>
            <td><b>Marital Status</b></td>
            <td>
                <select>
                    <option>Never Married</option>
                    <option>Divorced</option>
                    <option>Widowed</option>
                    <option>Separated</option>
                </select>
            </td>
        </tr>

        <tr>
            <td><b>Height</b></td>
            <td>
                <select>
                    <option>4'5"</option>
                    <option>4'8"</option>
                    <option>5'0"</option>
                    <option>5'5"</option>
                    <option>5'10"</option>
                    <option>6'0"</option>
                </select>
            </td>
        </tr>

        <tr>
            <td><b>Education</b></td>
            <td>
                <input type="text" placeholder="Highest qualification">
            </td>
        </tr>

        <tr>
            <td><b>Occupation</b></td>
            <td>
                <input type="text" placeholder="Your occupation">
            </td>
        </tr>

        <tr>
            <td><b>Annual Income</b></td>
            <td>
                <select>
                    <option>Below 2 Lakh</option>
                    <option>2 - 5 Lakh</option>
                    <option>5 - 10 Lakh</option>
                    <option>10 - 20 Lakh</option>
                    <option>Above 20 Lakh</option>
                </select>
            </td>
        </tr>

        <tr>
            <td><b>Mobile Number</b></td>
            <td>
                <input type="tel" placeholder="Enter mobile number">
            </td>
        </tr>

        <tr>
            <td><b>Email ID</b></td>
            <td>
                <input type="email" placeholder="Enter email">
            </td>
        </tr>

        <tr>
            <td><b>Password</b></td>
            <td>
                <input type="password" placeholder="Create password">
            </td>
        </tr>

        <tr>
            <td><b>About Yourself</b></td>
            <td>
                <textarea rows="4" cols="30" placeholder="Write about yourself"></textarea>
            </td>
        </tr>

        <tr>
            <td></td>
            <td>
                <input type="submit" value="Register">
                <input type="reset" value="Clear">
            </td>
        </tr>

    </table>
</form>

</body>
</html>
