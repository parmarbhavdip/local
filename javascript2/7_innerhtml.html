    <h1>innerhtml example</h1>
    <table width="80%" align="center" border="1">
        <tr>
            <td align="center"><button type="button" onclick="showHanumanChalisa();">show Hanuman chalisa</button></td>
            <td align="center"><button type="button" onclick="displayDateTime();">show current date & time</button></td>
            <td align="center"><button type="button" onclick="displayAll();">show both button value</button></td>
        </tr>
        <tr>
            <td width="33.33%" id="one"></td>
            <td width="33.33%" id="two"></td>
            <td width="33.33%" id="three"></td>
        </tr>

        //user defined function 
        //arrow function
        let displayAll = () => {
            let first = document.getElementById('one').innerHTML;
            let second = document.getElementById('two').innerHTML;
            let output = second + "<br/>" + first;
            document.getElementById('three').innerHTML = output;
        }

        let displayDateTime = function(){
            //variables declared using let is called local variable
            let now = new Date();
            let today = now.getDate() + "/" + (now.getMonth()+1) + "/" + now.getFullYear();
            let time = now.getHours() + ":" + now.getMinutes() + "AM/PM";
            document.getElementById('two').innerHTML = today + " " +  time;
        }
