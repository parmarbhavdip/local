<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>how to display another web page (without using link submit button)</h1>
    <script>
        //create user defined function 
        function openGoogle() {
            window.location = "http://www.google.com";
        }
        function openAmazon() {
            window.location = "http://www.amazon.com";
        }
        function openApple() {
            window.location = "http://www.apple.com";
        }
    </script>
    <form>
        <input type="button" value="open google" onclick="openGoogle();">
        <input type="button" value="open amazon" onclick="openAmazon();">
        <input type="button" value="open apple" onclick="openApple();">
    </form>
</body>

</html>
