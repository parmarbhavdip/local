<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falling Circles</title>

<style>
body {
    display: flex;
    gap: 20px;
    height: 100vh;
    margin: 0;
    overflow: hidden; /* prevent scroll */
}

/* Circle design */
.circle {
    height: 200px;
    width: 200px;
    border-radius: 50%;
    border: 2px solid black;
    background: lightblue;
}

/* Hover animation */
.circle:hover {
    animation: fall-down 1.5s ease-in-out forwards;
}

/* Animation */
@keyframes fall-down {
    from {
        transform: translateY(0);
    }
    to {
        transform: translateY(calc(100vh - 200px)); /* exact height */
    }
}
</style>

</head>

<body>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</body>
</html>
