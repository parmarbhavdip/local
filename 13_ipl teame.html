<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Teams Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #1a2530;
            padding: 30px 20px;
            text-align: center;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            color: #0d1b2a;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #4a5568;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        /* Flexbox Container */
        .team-container {
            display: flex;
            flex-wrap: wrap;
            margin: -12px;
        }

        /* Responsive Card Styling */
        .team-card {
            padding: 12px;
        }

        .card-inner {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 5px solid #cbd5e1; /* Base border */
        }

        .team-card:hover .card-inner {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .team-logo {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .team-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.3;
        }

        /* IPL Team Specific Accent Colors */
        .mi { border-bottom-color: #004ba0; }
        .csk { border-bottom-color: #fdb913; }
        .rcb { border-bottom-color: #ec1c24; }
        .kkr { border-bottom-color: #3a225d; }
        .dc { border-bottom-color: #0078bc; }
        .rr { border-bottom-color: #ea1a85; }
        .pk { border-bottom-color: #dd1f26; }
        .srh { border-bottom-color: #f26522; }
        .gt { border-bottom-color: #1b252c; }
        .lsg { border-bottom-color: #0057a3; }

        /* RESPONSIVE LAYOUT BREAKPOINTS */

        /* Mobile Screens: 1 team per line */
        .team-card {
            width: 100%;
        }

        /* Small Screens: 3 teams per line */
        @media (min-width: 576px) {
            .team-card {
                width: 33.33%;
            }
        }

        /* Medium Screens: 4 teams per line */
        @media (min-width: 768px) {
            .team-card {
                width: 25%;
            }
        }

        /* Large Screens: 6 teams per line */
        @media (min-width: 1200px) {
            .team-card {
                width: 16.66%;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>IPL Teams</h1>
        <p class="subtitle">Indian Premier League Contenders</p>
    </header>

    <div class="team-container">

        <div class="team-card">
            <div class="card-inner mi">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQnrOvtBWunKkF8xrgRWxAT3gsdoEWd14gnBg&s" alt="Mumbai Indians Logo" class="team-logo">
                <div class="team-name">Mumbai Indians</div>
            </div>
        </div>

        <div class="team-card">
            <div class="card-inner csk">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcST5ko4qcTgrQSpi5bCOTuH4kR6QBVSEUaj1g&s" alt="Chennai Super Kings Logo" class="team-logo">
                <div class="team-name">Chennai Super Kings</div>
            </div>
        </div>

        <div class="team-card">
            <div class="card-inner rcb">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSEIbg8v9EagFuLRO0JkaXYQ-4XfhkwMvTsfQ&s" alt="Royal Challengers Bengaluru Logo" class="team-logo">
                <div class="team-name">Royal Challengers Bengaluru</div>
            </div>
        </div>

        <div class="team-card">
            <div class="card-inner kkr">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR9HTfGbjpcitzoyas04sGC39VgbFB0rr-3CA&s" alt="Kolkata Knight Riders Logo" class="team-logo">
                <div class="team-name">Kolkata Knight Riders</div>
            </div>
        </div>

        <div class="team-card">
            <div class="card-inner dc">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQYO2sVM0H82sjh6GAxdeu2mYQjRw5N6iohJw&s" alt="Delhi Capitals Logo" class="team-logo">
                <div class="team-name">Delhi Capitals</div>
            </div>
        </div>

        <div class="team-card">
            <div class="card-inner rr">
                <img src="https://www.mbaskool.com/2015_images/stories/apr-images/ipl-logos07.jpg" alt="Rajasthan Royals Logo" class="team-logo">
                <div class="team-name">Rajasthan Royals</div>
            </div>
        </div>

        <div class="team-card">
            <div class="card-inner pk">
                <img src="https://assets.designhill.com/design-blog/wp-content/uploads/2025/03/5-4.jpg" alt="Punjab Kings Logo" class="team-logo">
                <div class="team-name">Punjab Kings</div>
            </div>
        </div>

        <div class="team-card">
            <div class="card-inner srh">
                <img src="https://assets.designhill.com/design-blog/wp-content/uploads/2025/03/8-4.jpg" alt="Sunrisers Hyderabad Logo" class="team-logo">
                <div class="team-name">Sunrisers Hyderabad</div>
            </div>
        </div>

        <div class="team-card">
            <div class="card-inner gt">
                <img src="https://c.ndtvimg.com/2022-02/4ts1faoo_gujarat-titans-logo-facebook_625x300_20_February_22.jpg" alt="Gujarat Titans Logo" class="team-logo">
                <div class="team-name">Gujarat Titans</div>
            </div>
        </div>

        <div class="team-card">
            <div class="card-inner lsg">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT4MWubTcWXuvR1rcyhd6ciovhKgLu9ZSEFZQ&s" alt="Lucknow Super Giants Logo" class="team-logo">
                <div class="team-name">Lucknow Super Giants</div>
            </div>
        </div>

    </div>

</body>
</html>
