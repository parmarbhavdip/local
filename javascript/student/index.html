<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">

    <title>Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Student Management System</span>
    </div>
</nav>

<div class="container mt-4">

    <div class="card p-4 mb-4">
        <h4>Add / Update Student</h4>

        <input type="hidden" id="editIndex">

        <div class="row g-3">
            <div class="col-md-3">
                <input id="roll" class="form-control" placeholder="Roll No">
            </div>

            <div class="col-md-3">
                <input id="name" class="form-control" placeholder="Name">
            </div>

            <div class="col-md-3">
                <select id="gender" class="form-control">
                    <option value="">Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

            <div class="col-md-3">
                <select id="classLevel" class="form-control">
                    <option value="">Class</option>
                    <option>9</option>
                    <option>10</option>
                    <option>11</option>
                    <option>12</option>
                </select>
            </div>

            <div class="col-md-4">
                <select id="department" class="form-control">
                    <option value="">Department</option>
                    <option>Science</option>
                    <option>Commerce</option>
                    <option>Arts</option>
                </select>
            </div>

            <div class="col-md-4">
                <input type="date" id="dob" class="form-control">
            </div>

            <div class="col-md-4">
                <input id="email" class="form-control" placeholder="Email">
            </div>

            <div class="col-md-4">
                <input id="mobile" class="form-control" placeholder="Mobile">
            </div>

            <div class="col-md-4">
                <input id="city" class="form-control" placeholder="City">
            </div>

            <div class="col-md-4">
                <select id="status" class="form-control">
                    <option value="">Status</option>
                    <option>Active</option>
                    <option>Inactive</option>
                </select>
            </div>

            <div class="col-12">
                <button type="button" class="btn btn-primary w-100" onclick="saveStudent()">
                    Save Student
                </button>
            </div>
        </div>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Roll</th>
                <th>Name</th>
                <th>Gender</th>
                <th>Class</th>
                <th>Department</th>
                <th>DOB</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>City</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>

</div>

<script src="script.js"></script>
</body>
</html>
